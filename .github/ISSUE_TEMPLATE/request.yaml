name: Feature request
description: Suggest a new feature or improvement
title: "feat: "
labels: ["type: feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the feature.
      placeholder: What do you want to add or improve?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed?
      placeholder: What problem does this solve?

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Additional context, ideas, or references.